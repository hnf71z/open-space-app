name: Continuous Integration

on:
  pull_request:
    branches: [ main ]

jobs:
  automation-test-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: [18, 20]
      - run: npm install
      - run: npm run ci:test